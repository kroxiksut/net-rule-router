<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="shield">
  <!-- Source icon: Tabler Icons (MIT), name: shield. Block 16.19.5 — UAC /
       administrator affordance for service control + admin baseline edit. -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #6366F1)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #4338CA)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #6366F1;
      --nrr-icon-end: #4338CA;
      --nrr-icon-stroke-width: 2.2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #818CF8;
        --nrr-icon-end: #6366F1;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #3730A3;
        --nrr-icon-end: #3730A3;
        --nrr-icon-stroke-width: 2.8;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #A5B4FC;
        --nrr-icon-end: #A5B4FC;
      }
    }
  </style>
  <title>shield</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a12 12 0 0 0 8.5 3a12 12 0 0 1 -8.5 15a12 12 0 0 1 -8.5 -15a12 12 0 0 0 8.5 -3" />
    <path d="M9 12l2 2l4 -4" />
  </g>
</svg>
