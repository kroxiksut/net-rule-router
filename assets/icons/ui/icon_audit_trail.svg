<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="icon_audit_trail">
  <!-- Source icon: Tabler Icons (MIT), name: shield-check -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #0EA5E9)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #16A34A)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #0EA5E9;
      --nrr-icon-end: #16A34A;
      --nrr-icon-stroke-width: 2.2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #38BDF8;
        --nrr-icon-end: #22C55E;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #000000;
        --nrr-icon-end: #000000;
        --nrr-icon-stroke-width: 2.8;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #ffffff;
        --nrr-icon-end: #ffffff;
      }
    }
  </style>
  <title>icon audit trail</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11.46 20.846a12 12 0 0 1 -7.96 -14.846a12 12 0 0 0 8.5 -3a12 12 0 0 0 8.5 3a12 12 0 0 1 -.09 7.06" />
    <path d="M15 19l2 2l4 -4" />
  </g>
</svg>
