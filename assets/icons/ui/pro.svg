<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="pro">
  <!-- NetRuleRouter custom icon: PRO badge with rounded filled text -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #1EA7FF)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #8A3FFC)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #1EA7FF;
      --nrr-icon-end: #8A3FFC;
      --nrr-icon-stroke-width: 2.1;
      --nrr-badge-fill-opacity: 0.14;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #59D0FF;
        --nrr-icon-end: #B18CFF;
        --nrr-badge-fill-opacity: 0.22;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #000000;
        --nrr-icon-end: #000000;
        --nrr-icon-stroke-width: 2.8;
        --nrr-badge-fill-opacity: 0.24;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #ffffff;
        --nrr-icon-end: #ffffff;
      }
    }
  </style>
  <title>pro</title>

  <rect x="3" y="5" width="18" height="14" rx="3.4"
        fill="url(#nrr-grad)" fill-opacity="var(--nrr-badge-fill-opacity)"
        stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)"/>

  <text x="12" y="15.2"
        text-anchor="middle"
        font-family="Arial Rounded MT Bold, Trebuchet MS, Segoe UI, Arial, sans-serif"
        font-size="7.4"
        font-weight="700"
        letter-spacing="0.45"
        fill="url(#nrr-grad)">PRO</text>
</svg>
