<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="rule-type-zones">
  <!-- Concentric zone rings. Paths only (QtSvg renders gradient strokes
       reliably on <path> but not on bare <circle>); literal stops (QtSvg
       ignores CSS var()/@media — high-contrast handled by the ui-hc/ variant). -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="#1EA7FF"/>
      <stop offset="1" stop-color="#8A3FFC"/>
    </linearGradient>
  </defs>
  <title>rule type zones</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4 a8 8 0 1 1 0 16 a8 8 0 1 1 0 -16 z" />
    <path d="M12 8 a4 4 0 1 1 0 8 a4 4 0 1 1 0 -8 z" />
    <path d="M12 10.8 a1.2 1.2 0 1 1 0 2.4 a1.2 1.2 0 1 1 0 -2.4 z" />
  </g>
</svg>
