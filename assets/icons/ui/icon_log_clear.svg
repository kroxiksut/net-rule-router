<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="icon_log_clear">
  <!-- Custom bold trash icon tuned for small-size visibility -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #F97316)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #DC2626)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #F97316;
      --nrr-icon-end: #DC2626;
      --nrr-icon-stroke-width: 2.5;
      --nrr-icon-fill-opacity: 0.28;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #FB923C;
        --nrr-icon-end: #F87171;
        --nrr-icon-fill-opacity: 0.32;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #000000;
        --nrr-icon-end: #000000;
        --nrr-icon-stroke-width: 3;
        --nrr-icon-fill-opacity: 0.3;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #ffffff;
        --nrr-icon-end: #ffffff;
      }
    }
  </style>
  <title>icon log clear</title>

  <g stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M4 7h16" />
    <path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3" />
    <path d="M5.2 7l1 12a2 2 0 0 0 2 2h7.6a2 2 0 0 0 2 -2l1 -12" />
  </g>

  <rect x="9.2" y="10.4" width="1.35" height="7.2" rx="0.35" fill="url(#nrr-grad)" fill-opacity="var(--nrr-icon-fill-opacity)" />
  <rect x="11.35" y="10.4" width="1.35" height="7.2" rx="0.35" fill="url(#nrr-grad)" fill-opacity="var(--nrr-icon-fill-opacity)" />
  <rect x="13.5" y="10.4" width="1.35" height="7.2" rx="0.35" fill="url(#nrr-grad)" fill-opacity="var(--nrr-icon-fill-opacity)" />
</svg>
