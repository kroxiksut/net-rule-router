<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="diagnostics">
  <!-- Source icon: Tabler Icons (MIT), name: stethoscope -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #1EA7FF)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #8A3FFC)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #1EA7FF;
      --nrr-icon-end: #8A3FFC;
      --nrr-icon-stroke-width: 2.2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #59D0FF;
        --nrr-icon-end: #B18CFF;
      }
    }
    @media (prefers-contrast: more) {
