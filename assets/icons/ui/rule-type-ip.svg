<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="rule-type-ip">
  <!-- Alternative icon: IP address -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #1EA7FF)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #8A3FFC)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #1EA7FF;
      --nrr-icon-end: #8A3FFC;
      --nrr-icon-stroke-width: 2.2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #59D0FF;
        --nrr-icon-end: #B18CFF;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #000000;
        --nrr-icon-end: #000000;
        --nrr-icon-stroke-width: 2.8;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #ffffff;
        --nrr-icon-end: #ffffff;
      }
    }
  </style>
  <title>rule type ip alt</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="6" width="18" height="12" rx="2" />
    <rect x="6" y="10" width="3" height="4" rx="0.8" />
    <rect x="10.5" y="10" width="3" height="4" rx="0.8" />
    <rect x="15" y="10" width="3" height="4" rx="0.8" />
    <circle cx="9.8" cy="12" r="0.35" />
    <circle cx="14.3" cy="12" r="0.35" />
  </g>
</svg>
