<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="rule-type-ip">
  <!-- IP/device chip. Paths only (QtSvg renders gradient strokes reliably on
       <path> but not on bare <rect>/<circle>); literal stops (QtSvg ignores
       CSS var()/@media — high-contrast handled by the ui-hc/ variant). -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="#1EA7FF"/>
      <stop offset="1" stop-color="#8A3FFC"/>
    </linearGradient>
  </defs>
  <title>rule type ip</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 6 h14 a2 2 0 0 1 2 2 v8 a2 2 0 0 1 -2 2 h-14 a2 2 0 0 1 -2 -2 v-8 a2 2 0 0 1 2 -2 z" />
    <path d="M7.5 10 v4" />
    <path d="M12 10 v4" />
    <path d="M16.5 10 v4" />
  </g>
</svg>
