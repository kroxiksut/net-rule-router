<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="route-primary">
  <!-- Source icon: Tabler Icons (MIT), name: circle-arrow-left -->
  <defs>
    <linearGradient id="nrr-grad" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="var(--nrr-icon-start, #1EA7FF)"/>
      <stop offset="1" stop-color="var(--nrr-icon-end, #3B82F6)"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --nrr-icon-start: #1EA7FF;
      --nrr-icon-end: #3B82F6;
      --nrr-icon-stroke-width: 2.2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #6BC7FF;
        --nrr-icon-end: #8EA8FF;
      }
    }
    @media (prefers-contrast: more) {
      :root {
        --nrr-icon-start: #000000;
        --nrr-icon-end: #000000;
        --nrr-icon-stroke-width: 2.8;
      }
    }
    @media (prefers-contrast: more) and (prefers-color-scheme: dark) {
      :root {
        --nrr-icon-start: #ffffff;
        --nrr-icon-end: #ffffff;
      }
    }
  </style>
  <title>route-primary</title>
  <g fill="none" stroke="url(#nrr-grad)" stroke-width="var(--nrr-icon-stroke-width)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 21a9 9 0 1 0 0 -18a9 9 0 0 0 0 18" />
  <path d="M8 12l4 4" />
